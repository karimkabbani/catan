<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Catan — Mobile Preview</title>
<style>
  :root{ color-scheme:dark; }
  *{box-sizing:border-box;}
  body{margin:0; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; padding:20px; background:#161b26; color:#cdd6e4;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  .bar{display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:center;}
  select,button{background:#262f40; color:#e3eaf6; border:1px solid #3a4458; border-radius:8px;
    padding:8px 12px; font-size:14px; cursor:pointer;}
  button:active{transform:translateY(1px);}
  .dim{font-size:13px; color:#8b97ad; min-width:96px;}
  .device{border:13px solid #0c0f16; border-radius:30px; background:#000; overflow:hidden;
    box-shadow:0 24px 70px rgba(0,0,0,0.55), inset 0 0 0 2px #1c2331;}
  iframe{display:block; border:0; background:#0c3d68;}
  .hint{font-size:12px; color:#6f7c92; max-width:560px; text-align:center; line-height:1.5;}
</style>
</head>
<body>
  <div class="bar">
    <label>Device&nbsp;
      <select id="dev"></select>
    </label>
    <span class="dim" id="dim"></span>
    <button id="reload">↻ Reload game</button>
    <button id="auto">Auto-reload: off</button>
  </div>
  <div class="device" id="frame">
    <iframe id="game" src="index.html"></iframe>
  </div>
  <div class="hint">This is the exact phone layout, live. Edit the game, then hit <b>Reload game</b> (or turn on
    Auto-reload to refresh every 2s). Pick your real phone's model below to match what you see on the device.</div>
<script>
  // Common landscape phone/tablet viewports (CSS pixels, already rotated to landscape)
  var devices = [
    { n:'iPhone SE',            w:667,  h:375 },
    { n:'iPhone 13/14',         w:844,  h:390 },
    { n:'iPhone 14 Pro Max',    w:932,  h:430 },
    { n:'iPhone 15 Pro',        w:852,  h:393 },
    { n:'Pixel 7',              w:915,  h:412 },
    { n:'Galaxy S22',           w:780,  h:360 },
    { n:'iPad mini',            w:1024, h:768 },
  ];
  var sel = document.getElementById('dev');
  var frame = document.getElementById('game');
  devices.forEach(function (d, i) {
    var o = document.createElement('option');
    o.value = i; o.textContent = d.n + '  (' + d.w + '×' + d.h + ')';
    sel.appendChild(o);
  });
  function apply() {
    var d = devices[sel.value];
    // scale down if the phone is wider than the window so it always fits
    var avail = window.innerWidth - 80;
    var scale = Math.min(1, avail / d.w);
    frame.style.width = d.w + 'px';
    frame.style.height = d.h + 'px';
    frame.style.transform = 'scale(' + scale + ')';
    frame.style.transformOrigin = 'top left';
    // size the device shell to the scaled iframe
    var shell = document.getElementById('frame');
    shell.style.width = (d.w * scale) + 'px';
    shell.style.height = (d.h * scale) + 'px';
    document.getElementById('dim').textContent = d.w + ' × ' + d.h + (scale < 1 ? '  (' + Math.round(scale * 100) + '%)' : '');
  }
  sel.value = 1; sel.onchange = apply;
  window.addEventListener('resize', apply);
  apply();

  document.getElementById('reload').onclick = function () { frame.contentWindow.location.reload(); };
  var timer = null;
  document.getElementById('auto').onclick = function () {
    if (timer) { clearInterval(timer); timer = null; this.textContent = 'Auto-reload: off'; }
    else { timer = setInterval(function () { frame.contentWindow.location.reload(); }, 2000); this.textContent = 'Auto-reload: on'; }
  };
</script>
</body>
</html>
